backend:
  name: github
  repo: ObdachIos/Pitzlloch-Homepage
  branch: main
  base_url: https://pitzlloch-homepage.vercel.app
  auth_endpoint: /api/auth

media_folder: "images"
public_folder: "/images"

locale: de

collections:

  # ── EINSTELLUNGEN ──────────────────────────────────────────
  - name: einstellungen
    label: "⚙️ Einstellungen"
    files:
      - name: global
        label: "Kontakt & Allgemeine Infos"
        file: "data/global.json"
        format: json
        fields:
          - { label: "Telefon Anzeige", name: phone_display, widget: string }
          - { label: "Telefon-Link (tel:+49…)", name: phone_href, widget: string }
          - { label: "E-Mail", name: email, widget: string }
          - { label: "Adresse Zeile 1", name: address1, widget: string }
          - { label: "Adresse Zeile 2", name: address2, widget: string }
          - { label: "Öffnungszeiten Mo–Fr", name: hours_weekday, widget: string }
          - { label: "Öffnungszeiten Samstag", name: hours_saturday, widget: string }
          - { label: "Öffnungszeiten Sonntag", name: hours_sunday, widget: string }
          - { label: "Google Bewertung (z.B. 4,9)", name: rating, widget: string }
          - { label: "Anzahl Bewertungen", name: review_count, widget: string }
          - { label: "Max. Gästezahl (z.B. 200+)", name: max_guests, widget: string }

  # ── STARTSEITE ─────────────────────────────────────────────
  - name: startseite
    label: "🏠 Startseite"
    files:
      - name: hero
        label: "Hero – Startbild & Text"
        file: "data/hero.json"
        format: json
        fields:
          - { label: "Hero Bild", name: image, widget: image }
          - { label: "Begrüßungstext (klein)", name: welcome, widget: string }
          - { label: "Haupttitel", name: title, widget: string }
          - { label: "Untertitel", name: subtitle, widget: string }
          - { label: "Beschreibungstext", name: description, widget: text }

  # ── PREISE ────────────────────────────────────────────────
  - name: preise
    label: "💰 Preise & Pakete"
    files:
      - name: pakete
        label: "Pakete verwalten"
        file: "data/preise.json"
        format: json
        fields:
          - label: "Pakete"
            name: pakete
            widget: list
            label_singular: "Paket"
            fields:
              - { label: "Emoji Icon", name: icon, widget: string, hint: "z.B. 🌿 oder ✨" }
              - { label: "Paketname", name: name, widget: string }
              - { label: "Preis / Info", name: price, widget: string, hint: "z.B. 'Auf Anfrage · ab 80 Personen'" }
              - { label: "Empfohlen (hervorgehoben)", name: featured, widget: boolean, default: false }
              - { label: "Badge Text", name: badge, widget: string, required: false, hint: "z.B. 'Beliebteste Wahl' – leer lassen wenn kein Badge" }
              - label: "Leistungen"
                name: features
                widget: list
                field: { label: "Leistung", name: feature, widget: string }

  # ── FAQ ───────────────────────────────────────────────────
  - name: faq
    label: "❓ FAQ"
    files:
      - name: fragen
        label: "Häufige Fragen verwalten"
        file: "data/faq.json"
        format: json
        fields:
          - label: "Kategorien"
            name: kategorien
            widget: list
            label_singular: "Kategorie"
            fields:
              - { label: "Kategorie-Label (klein)", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - label: "Fragen"
                name: fragen
                widget: list
                label_singular: "Frage"
                fields:
                  - { label: "Frage", name: frage, widget: string }
                  - { label: "Antwort", name: antwort, widget: text }

  # ── BEWERTUNGEN ───────────────────────────────────────────
  - name: bewertungen
    label: "⭐ Kundenbewertungen"
    files:
      - name: reviews
        label: "Bewertungen verwalten"
        file: "data/reviews.json"
        format: json
        fields:
          - label: "Bewertungen"
            name: reviews
            widget: list
            label_singular: "Bewertung"
            fields:
              - { label: "Name", name: author, widget: string }
              - { label: "Datum", name: date, widget: string, hint: "z.B. September 2024" }
              - { label: "Bewertungstext", name: text, widget: text }
              - { label: "Sterne", name: stars, widget: number, min: 1, max: 5, default: 5 }

  # ── TEAM ─────────────────────────────────────────────────
  - name: team
    label: "👥 Team (Über uns)"
    files:
      - name: mitglieder
        label: "Teammitglieder verwalten"
        file: "data/team.json"
        format: json
        fields:
          - label: "Teammitglieder"
            name: mitglieder
            widget: list
            label_singular: "Person"
            fields:
              - { label: "Foto", name: bild, widget: image, required: false }
              - { label: "Name", name: name, widget: string }
              - { label: "Position / Rolle", name: rolle, widget: string }
              - { label: "Zitat", name: zitat, widget: text }

