backend:
  name: github
  repo: ObdachIos/Pitzlloch-Homepage
  branch: main
  base_url: https://pitzlloch-homepage.vercel.app
  auth_endpoint: /api/auth

media_folder: "images"
public_folder: "/images"

locale: de

collections:

  # ── EINSTELLUNGEN ──────────────────────────────────────────
  - name: einstellungen
    label: "⚙️ Einstellungen"
    files:
      - name: global
        label: "Kontakt & Allgemeine Infos"
        file: "data/global.json"
        format: json
        fields:
          - { label: "📞 Telefon (Anzeige)", name: phone_display, widget: string }
          - { label: "📞 Telefon (Link)", name: phone_href, widget: string, hint: "z.B. tel:+491606503067" }
          - { label: "✉️ E-Mail", name: email, widget: string }
          - { label: "📍 Adresse Zeile 1", name: address1, widget: string }
          - { label: "📍 Adresse Zeile 2", name: address2, widget: string }
          - { label: "🕐 Öffnungszeiten Mo–Fr", name: hours_weekday, widget: string }
          - { label: "🕐 Öffnungszeiten Samstag", name: hours_saturday, widget: string }
          - { label: "🕐 Öffnungszeiten Sonntag", name: hours_sunday, widget: string }
          - { label: "⭐ Google Bewertung", name: rating, widget: string, hint: "z.B. 4,9" }
          - { label: "💬 Anzahl Bewertungen", name: review_count, widget: string }
          - { label: "👥 Max. Gästezahl", name: max_guests, widget: string, hint: "z.B. 200+" }

  # ── STARTSEITE ─────────────────────────────────────────────
  - name: startseite
    label: "🏠 Startseite"
    files:
      - name: hero
        label: "Startbild & Haupttext"
        file: "data/hero.json"
        format: json
        fields:
          - { label: "🖼️ Hintergrundbild", name: image, widget: image }
          - { label: "Kleiner Text oben", name: welcome, widget: string }
          - { label: "Haupttitel (groß)", name: title, widget: string }
          - { label: "Untertitel", name: subtitle, widget: string }
          - { label: "Beschreibungstext", name: description, widget: text }

      - name: inhalte
        label: "Weitere Inhalte (Abschnitte)"
        file: "data/page-startseite.json"
        format: json
        fields:
          - label: "📍 Abschnitt: Die Location"
            name: location
            widget: object
            fields:
              - { label: "Label (klein, oben)", name: label, widget: string }
              - { label: "Script-Text (kursiv)", name: script, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "🖼️ Bild", name: bild, widget: image, required: false }
              - { label: "Einleitung (fett)", name: lead, widget: text }
              - { label: "Beschreibungstext", name: text, widget: text }
          - label: "❝ Abschnitt: Zitat"
            name: zitat
            widget: object
            fields:
              - { label: "Zitat-Text", name: text, widget: text }
              - { label: "Autor / Unterzeile", name: author, widget: string }
          - label: "🎯 Angebote: Überschrift"
            name: angebote_intro
            widget: object
            fields:
              - { label: "Label (klein)", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "Text", name: text, widget: text }
          - label: "🃏 Angebote: Karten"
            name: angebote
            widget: list
            label_singular: "Karte"
            summary: "{{title}}"
            fields:
              - { label: "🖼️ Bild", name: bild, widget: image, required: false }
              - { label: "Label (klein)", name: label, widget: string }
              - { label: "Titel", name: title, widget: string }
              - { label: "Text", name: text, widget: text }
              - { label: "Button-Text", name: link_text, widget: string }
              - { label: "Button-Ziel (Link)", name: link_url, widget: string, hint: "z.B. /hochzeiten.html" }
          - label: "🌳 Abschnitt: Feiern unter freiem Himmel"
            name: aussen
            widget: object
            fields:
              - { label: "Label (klein)", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "Einleitung", name: lead, widget: text }
              - { label: "🖼️ Bild", name: bild, widget: image, required: false }
              - label: "Häkchen-Punkte"
                name: features
                widget: list
                field: { label: "Punkt", name: punkt, widget: string }
          - label: "⭐ Bewertungen: Überschrift"
            name: bewertungen_intro
            widget: object
            fields:
              - { label: "Label (klein)", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "Text", name: text, widget: text }
          - label: "🤝 Abschnitt: Partner / Dienstleister"
            name: partner
            widget: object
            fields:
              - { label: "Label (klein)", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "Einleitungstext", name: text, widget: text }
              - { label: "Icon (Emoji)", name: icon, widget: string }
              - { label: "Karte: Label", name: card_label, widget: string }
              - { label: "Karte: Titel", name: card_title, widget: string }
              - { label: "Karte: Text", name: card_text, widget: text }
              - { label: "Button-Text", name: link_text, widget: string }
              - { label: "Button-Ziel (URL)", name: link_url, widget: string }
          - label: "📣 Abschnitt: CTA-Banner (ganz unten)"
            name: cta
            widget: object
            fields:
              - { label: "Label (klein)", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "Text", name: text, widget: text }
              - { label: "Haupt-Button: Text", name: btn_primary_text, widget: string }
              - { label: "Haupt-Button: Ziel", name: btn_primary_url, widget: string }
              - { label: "Telefon-Button: Text", name: btn_phone_text, widget: string }
              - { label: "Telefon-Button: Ziel", name: btn_phone_url, widget: string, hint: "z.B. tel:+491606503067" }

  # ── HOCHZEITEN ─────────────────────────────────────────────
  - name: hochzeiten
    label: "💍 Hochzeiten"
    files:
      - name: bilder
        label: "Bilder & Texte"
        file: "data/page-hochzeiten.json"
        format: json
        fields:
          - { label: "🖼️ Hero-Bild (Seitenbanner)", name: hero_bild, widget: image, required: false }
          - { label: "Hero-Untertitel", name: hero_untertitel, widget: text }
          - { label: "Intro-Überschrift", name: intro_heading, widget: string }
          - { label: "Intro-Text", name: intro_text, widget: text }
          - { label: "🖼️ Bild Festsaal", name: festsaal_bild, widget: image, required: false }
          - { label: "Festsaal Beschreibungstext", name: festsaal_lead, widget: text }
          - label: "Festsaal Leistungen (Bullet-Punkte)"
            name: festsaal_features
            widget: list
            field: { label: "Punkt", name: feature, widget: string }
          - { label: "🖼️ Bild Außenbereich", name: aussen_bild, widget: image, required: false }
          - { label: "Außenbereich Überschrift", name: aussen_heading, widget: string }
          - { label: "Außenbereich Beschreibungstext", name: aussen_lead, widget: text }
          - label: "Außenbereich Leistungen (Bullet-Punkte)"
            name: aussen_features
            widget: list
            field: { label: "Punkt", name: feature, widget: string }

  # ── FEIERN & EVENTS ────────────────────────────────────────
  - name: feiern
    label: "🎉 Feiern & Events"
    files:
      - name: bilder
        label: "Bilder & Texte"
        file: "data/page-feiern.json"
        format: json
        fields:
          - { label: "🖼️ Hero-Bild (Seitenbanner)", name: hero_bild, widget: image, required: false }
          - { label: "Hero-Untertitel", name: hero_untertitel, widget: text }
          - { label: "Intro-Überschrift", name: intro_heading, widget: string }
          - { label: "Intro-Text", name: intro_text, widget: text }
          - { label: "🖼️ Bild Service/Leistungen", name: service_bild, widget: image, required: false }
          - { label: "Leistungen Beschreibungstext", name: service_lead, widget: text }
          - label: "Leistungen Bullet-Punkte"
            name: service_features
            widget: list
            field: { label: "Punkt", name: feature, widget: string }

  # ── KULINARIK ──────────────────────────────────────────────
  - name: kulinarik
    label: "🍽️ Kulinarik"
    files:
      - name: bilder
        label: "Bilder & Texte"
        file: "data/page-kulinarik.json"
        format: json
        fields:
          - { label: "🖼️ Hero-Bild (Seitenbanner)", name: hero_bild, widget: image, required: false }
          - { label: "Hero-Untertitel", name: hero_untertitel, widget: text }
          - { label: "🖼️ Bild Philosophie/Küche", name: philosophie_bild, widget: image, required: false }
          - { label: "Philosophie Überschrift", name: philosophie_heading, widget: string }
          - { label: "Philosophie Einleitungstext", name: philosophie_lead, widget: text }
          - { label: "Philosophie Beschreibungstext", name: philosophie_text, widget: text }
          - { label: "🖼️ Bild Sonderwünsche/Torte", name: wuensche_bild, widget: image, required: false }
          - { label: "Sonderwünsche Überschrift", name: wuensche_heading, widget: string }
          - { label: "Sonderwünsche Einleitungstext", name: wuensche_lead, widget: text }
          - label: "Sonderwünsche Bullet-Punkte"
            name: wuensche_features
            widget: list
            field: { label: "Punkt", name: feature, widget: string }

  # ── RÄUMLICHKEITEN ─────────────────────────────────────────
  - name: raeumlichkeiten
    label: "🏛️ Räumlichkeiten"
    files:
      - name: bilder
        label: "Bilder & Texte"
        file: "data/page-raeumlichkeiten.json"
        format: json
        fields:
          - { label: "🖼️ Hero-Bild (Seitenbanner)", name: hero_bild, widget: image, required: false }
          - { label: "Hero-Untertitel", name: hero_untertitel, widget: text }
          - { label: "🖼️ Bild Festsaal", name: festsaal_bild, widget: image, required: false }
          - { label: "Festsaal Beschreibungstext", name: festsaal_lead, widget: text }
          - label: "Festsaal Leistungen (Bullet-Punkte)"
            name: festsaal_features
            widget: list
            field: { label: "Punkt", name: feature, widget: string }
          - { label: "🖼️ Bild Terrasse/Garten", name: terrasse_bild, widget: image, required: false }
          - { label: "Außenbereich Überschrift", name: aussen_heading, widget: string }
          - { label: "Außenbereich Beschreibungstext", name: aussen_lead, widget: text }
          - label: "Außenbereich Leistungen (Bullet-Punkte)"
            name: aussen_features
            widget: list
            field: { label: "Punkt", name: feature, widget: string }

  # ── ÜBER UNS ───────────────────────────────────────────────
  - name: ueberuns
    label: "👤 Über uns"
    files:
      - name: bilder
        label: "Bilder & Texte"
        file: "data/page-ueberuns.json"
        format: json
        fields:
          - { label: "🖼️ Hero-Bild (Seitenbanner)", name: hero_bild, widget: image, required: false }
          - { label: "🖼️ Bild Geschichte/Location", name: geschichte_bild, widget: image, required: false }
          - { label: "Geschichte Einleitungstext", name: geschichte_lead, widget: text }
          - { label: "Geschichte Absatz 1", name: geschichte_text1, widget: text }
          - { label: "Geschichte Absatz 2", name: geschichte_text2, widget: text }
          - label: "Unsere Werte (3 Karten)"
            name: werte
            widget: list
            label_singular: "Wert"
            summary: "{{icon}} {{heading}}"
            fields:
              - { label: "Icon (Emoji)", name: icon, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - { label: "Text", name: text, widget: text }
          - { label: "🖼️ Bild Lage/Panorama", name: lage_bild, widget: image, required: false }
          - { label: "Lage Einleitungstext", name: lage_lead, widget: text }
          - { label: "Lage Beschreibungstext", name: lage_text, widget: text }

  # ── TEAM ───────────────────────────────────────────────────
  - name: team
    label: "👥 Team"
    files:
      - name: mitglieder
        label: "Teammitglieder bearbeiten"
        file: "data/team.json"
        format: json
        fields:
          - label: "Teammitglieder"
            name: mitglieder
            widget: list
            label_singular: "Person"
            summary: "{{name}} ({{rolle}})"
            fields:
              - { label: "Foto", name: bild, widget: image, required: false }
              - { label: "Name", name: name, widget: string }
              - { label: "Position / Rolle", name: rolle, widget: string }
              - { label: "Zitat", name: zitat, widget: text }

  # ── GALERIE ────────────────────────────────────────────────
  - name: galerie
    label: "🖼️ Galerie"
    files:
      - name: bilder
        label: "Galeriebilder verwalten"
        file: "data/galerie.json"
        format: json
        fields:
          - label: "Bilder"
            name: bilder
            widget: list
            label_singular: "Bild"
            summary: "{{kategorie}} – {{alt}}"
            fields:
              - { label: "Bild hochladen", name: bild, widget: image }
              - label: "Kategorie"
                name: kategorie
                widget: select
                options:
                  - { label: "Hochzeiten", value: "hochzeiten" }
                  - { label: "Events & Feiern", value: "events" }
                  - { label: "Räumlichkeiten", value: "raeume" }
                  - { label: "Außenbereich", value: "aussen" }
                  - { label: "Kulinarik", value: "kulinarik" }
              - { label: "Bildbeschreibung (Alt-Text)", name: alt, widget: string }
              - { label: "Breites Format (doppelte Breite)", name: breit, widget: boolean, default: false }

  # ── PREISE ────────────────────────────────────────────────
  - name: preise
    label: "💰 Preise & Pakete"
    files:
      - name: pakete
        label: "Pakete bearbeiten"
        file: "data/preise.json"
        format: json
        fields:
          - label: "Pakete"
            name: pakete
            widget: list
            label_singular: "Paket"
            summary: "{{icon}} {{name}} — {{price}}"
            fields:
              - { label: "Icon (Emoji)", name: icon, widget: string, hint: "z.B. 🌿 ✨ 👑" }
              - { label: "Paketname", name: name, widget: string }
              - { label: "Preis / Info-Zeile", name: price, widget: string }
              - { label: "Als empfohlen hervorheben?", name: featured, widget: boolean, default: false }
              - { label: "Badge-Text", name: badge, widget: string, required: false }
              - label: "Leistungen"
                name: features
                widget: list
                summary: "{{fields.feature}}"
                field: { label: "Leistung", name: feature, widget: string }

  # ── FAQ ───────────────────────────────────────────────────
  - name: faq
    label: "❓ Häufige Fragen"
    files:
      - name: fragen
        label: "Fragen & Antworten"
        file: "data/faq.json"
        format: json
        fields:
          - label: "Kategorien"
            name: kategorien
            widget: list
            label_singular: "Kategorie"
            summary: "{{heading}}"
            fields:
              - { label: "Kategorie-Label", name: label, widget: string }
              - { label: "Überschrift", name: heading, widget: string }
              - label: "Fragen"
                name: fragen
                widget: list
                label_singular: "Frage"
                summary: "{{frage}}"
                fields:
                  - { label: "Frage", name: frage, widget: string }
                  - { label: "Antwort", name: antwort, widget: text }

  # ── BEWERTUNGEN ───────────────────────────────────────────
  - name: bewertungen
    label: "⭐ Kundenbewertungen"
    files:
      - name: reviews
        label: "Bewertungen bearbeiten"
        file: "data/reviews.json"
        format: json
        fields:
          - label: "Bewertungen"
            name: reviews
            widget: list
            label_singular: "Bewertung"
            summary: "⭐ {{author}} – {{date}}"
            fields:
              - { label: "Name des Gastes", name: author, widget: string }
              - { label: "Datum", name: date, widget: string, hint: "z.B. September 2024" }
              - { label: "Bewertungstext", name: text, widget: text }
              - { label: "Sterne (1–5)", name: stars, widget: number, value_type: int, min: 1, max: 5, default: 5 }

  # ── INFO-BANNER ───────────────────────────────────────────
  - name: banner
    label: "📢 Info-Banner"
    files:
      - name: banner
        label: "Banner bearbeiten"
        file: "data/banner.json"
        format: json
        fields:
          - { label: "Banner anzeigen?", name: aktiv, widget: boolean, default: false, hint: "Ein = Banner erscheint auf allen Seiten. Aus = Banner versteckt." }
          - label: "Typ / Farbe"
            name: typ
            widget: select
            options:
              - { label: "ℹ️ Info (Gold)", value: "info" }
              - { label: "🏖️ Urlaub / Betriebsferien (Braun)", value: "urlaub" }
              - { label: "🎉 Besonderes Event (Dunkelgrün)", value: "event" }
              - { label: "⚠️ Wichtige Meldung (Rot)", value: "warnung" }
          - { label: "Banner-Text", name: text, widget: string, hint: "Kurzer Text – z.B. 'Betriebsurlaub 24.12.–06.01. – Ab 7. Januar erreichbar'" }
          - { label: "Link-Text (optional)", name: link_text, widget: string, required: false, hint: "z.B. 'Termin anfragen' – leer lassen wenn kein Link" }
          - { label: "Link-Ziel (optional)", name: link_url, widget: string, required: false, hint: "z.B. /kontakt.html" }

  # ── VERFÜGBARKEITS-KALENDER ───────────────────────────────
  - name: kalender
    label: "📅 Verfügbarkeits-Kalender"
    files:
      - name: kalender
        label: "Buchungen & Verfügbarkeit"
        file: "data/kalender.json"
        format: json
        fields:
          - { label: "Kalender auf Kontaktseite anzeigen?", name: aktiv, widget: boolean, default: true }
          - { label: "Überschrift", name: titel, widget: string }
          - { label: "Hinweistext unter dem Kalender", name: hinweis, widget: text }
          - label: "Buchungen / gebuchte Termine"
            name: buchungen
            widget: list
            label_singular: "Buchung"
            summary: "{{von}} – {{bis}} ({{label}})"
            fields:
              - { label: "Von (Datum)", name: von, widget: datetime, date_format: "DD.MM.YYYY", time_format: false, format: "YYYY-MM-DD", hint: "Startdatum der Buchung" }
              - { label: "Bis (Datum)", name: bis, widget: datetime, date_format: "DD.MM.YYYY", time_format: false, format: "YYYY-MM-DD", hint: "Enddatum der Buchung (= Von wenn nur 1 Tag)" }
              - { label: "Bezeichnung (intern, wird nicht angezeigt)", name: label, widget: string, required: false, hint: "z.B. 'Hochzeit Familie Müller' – nur für Sie sichtbar" }
              - label: "Darstellung"
                name: typ
                widget: select
                options:
                  - { label: "Belegt / Gebucht (Rot)", value: "belegt" }
                  - { label: "Besonderes Event (Gold)", value: "event" }
                  - { label: "Option / Anfrage läuft (gestrichelt)", value: "option" }
