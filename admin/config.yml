backend:
  name: github
  repo: Obdachlos/Pitzlloch-Homepage
  branch: main
  base_url: https://pitzlloch-homepage.vercel.app
  auth_endpoint: /api/auth

media_folder: "images"
public_folder: "/images"

collections:

  - name: einstellungen
    label: "Einstellungen"
    files:
      - name: global
        label: "Kontakt und Allgemeine Infos"
        file: "data/global.json"
        format: json
        fields:
          - { label: "Telefon Anzeige", name: phone_display, widget: string }
          - { label: "Telefon-Link", name: phone_href, widget: string }
          - { label: "E-Mail", name: email, widget: string }
          - { label: "Adresse Zeile 1", name: address1, widget: string }
          - { label: "Adresse Zeile 2", name: address2, widget: string }
          - { label: "Oeffnungszeiten Mo-Fr", name: hours_weekday, widget: string }
          - { label: "Oeffnungszeiten Samstag", name: hours_saturday, widget: string }
          - { label: "Oeffnungszeiten Sonntag", name: hours_sunday, widget: string }
          - { label: "Google Bewertung", name: rating, widget: string }
          - { label: "Anzahl Bewertungen", name: review_count, widget: string }
          - { label: "Max Gaestezahl", name: max_guests, widget: string }

  - name: startseite
    label: "Startseite"
    files:
      - name: hero
        label: "Hero Startbild und Text"
        file: "data/hero.json"
        format: json
        fields:
          - { label: "Hero Bild", name: image, widget: image }
          - { label: "Begruessungstext", name: welcome, widget: string }
          - { label: "Haupttitel", name: title, widget: string }
          - { label: "Untertitel", name: subtitle, widget: string }
          - { label: "Beschreibungstext", name: description, widget: text }

  - name: bewertungen
    label: "Kundenbewertungen"
    files:
      - name: reviews
        label: "Bewertungen verwalten"
        file: "data/reviews.json"
        format: json
        fields:
          - label: "Bewertungen"
            name: reviews
            widget: list
            label_singular: "Bewertung"
            fields:
              - { label: "Name", name: author, widget: string }
              - { label: "Datum", name: date, widget: string }
              - { label: "Text", name: text, widget: text }
              - { label: "Sterne", name: stars, widget: number, min: 1, max: 5, default: 5 }
