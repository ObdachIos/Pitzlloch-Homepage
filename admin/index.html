<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitzlloch – Inhaltsverwaltung</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
  (function () {
    CMS.registerPreviewStyle('/css/style.css');
    CMS.registerPreviewStyle(
      'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=Great+Vibes&display=swap'
    );

    const h = React.createElement;

    function getData(entry) {
      try {
        if (entry && entry.data) return entry.data;
        if (entry && typeof entry.getIn === 'function') return entry.getIn(['data']).toJS();
      } catch(e) {}
      return {};
    }

    const C = {
      gold: '#c9a96e', green: '#1a2f27', cream: '#f5f0e8',
      label: { fontSize: '.72rem', letterSpacing: '.18em', textTransform: 'uppercase', color: '#c9a96e', display: 'block', marginBottom: '.3rem' },
      heading: { fontFamily: '"Cormorant Garamond", serif', fontWeight: 400, color: '#1a2f27', lineHeight: 1.2 },
    };

    /* ── Seitenbanner-Vorschau (für alle Unterseiten) ────── */
    function PageHeroPreview({ bild, untertitel, label, titel }) {
      const bg = bild
        ? { backgroundImage: `linear-gradient(rgba(10,25,18,.55),rgba(10,25,18,.55)),url(${bild})`, backgroundSize: 'cover', backgroundPosition: 'center' }
        : { background: C.green };
      return h('section', { style: { ...bg, minHeight: '50vh', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '4rem 2rem' } },
        h('div', {},
          h('span', { style: C.label }, label),
          h('h1', { style: { ...C.heading, fontSize: '3.5rem', color: C.cream, margin: '.3rem 0' } }, titel),
          untertitel && h('p', { style: { color: 'rgba(245,240,232,.78)', maxWidth: '560px', lineHeight: 1.7, marginTop: '.75rem', fontFamily: 'Inter, sans-serif', fontSize: '.95rem' } }, untertitel)
        )
      );
    }

    /* ── STARTSEITE ─────────────────────────────────────── */
    function StartseitPreview({ entry }) {
      const d = getData(entry);
      const bg = d.image
        ? { backgroundImage: `linear-gradient(rgba(10,25,18,.58),rgba(10,25,18,.58)),url(${d.image})`, backgroundSize: 'cover', backgroundPosition: 'center' }
        : { background: C.green };
      return h('section', { style: { ...bg, minHeight: '75vh', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '4rem 2rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {},
          h('span', { style: { fontSize: '.75rem', letterSpacing: '.2em', textTransform: 'uppercase', color: 'rgba(245,240,232,.6)', display: 'block', marginBottom: '.5rem' } }, d.welcome),
          h('h1', { style: { fontFamily: '"Cormorant Garamond", serif', fontSize: '5.5rem', fontWeight: 300, color: C.cream, margin: '0 0 .25rem', lineHeight: 1 } }, d.title),
          h('p', { style: { fontFamily: '"Cormorant Garamond", serif', fontSize: '1.6rem', fontStyle: 'italic', color: 'rgba(245,240,232,.8)', margin: '0 0 1.5rem' } }, d.subtitle),
          h('p', { style: { color: 'rgba(245,240,232,.65)', maxWidth: '500px', lineHeight: 1.8, fontSize: '.92rem' } }, d.description),
          h('div', { style: { marginTop: '2rem', display: 'flex', gap: '.75rem', justifyContent: 'center', flexWrap: 'wrap' } },
            h('span', { style: { background: C.gold, color: '#fff', padding: '.65rem 1.5rem', borderRadius: '6px', fontSize: '.88rem', fontWeight: 500 } }, 'Termin anfragen'),
            h('span', { style: { border: '1.5px solid rgba(245,240,232,.5)', color: C.cream, padding: '.65rem 1.5rem', borderRadius: '6px', fontSize: '.88rem' } }, 'Traumhochzeiten')
          )
        )
      );
    }
    CMS.registerPreviewTemplate('startseite', StartseitPreview);

    /* ── HOCHZEITEN ─────────────────────────────────────── */
    function HochzeitenPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { fontFamily: 'Inter, sans-serif' } },
        PageHeroPreview({ bild: d.hero_bild, untertitel: d.hero_untertitel, label: 'Traumhochzeiten', titel: 'Hochzeiten im Pitzlloch' }),
        h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', padding: '1.5rem', background: C.cream } },
          BildCard(d.festsaal_bild, 'Festsaal'),
          BildCard(d.aussen_bild, 'Außenbereich')
        )
      );
    }
    CMS.registerPreviewTemplate('hochzeiten', HochzeitenPreview);

    /* ── FEIERN ─────────────────────────────────────────── */
    function FeiernPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { fontFamily: 'Inter, sans-serif' } },
        PageHeroPreview({ bild: d.hero_bild, untertitel: d.hero_untertitel, label: 'Private & Business Events', titel: 'Feiern & Events' }),
        h('div', { style: { padding: '1.5rem', background: C.cream } },
          BildCard(d.service_bild, 'Service / Leistungen')
        )
      );
    }
    CMS.registerPreviewTemplate('feiern', FeiernPreview);

    /* ── KULINARIK ──────────────────────────────────────── */
    function KulinarikPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { fontFamily: 'Inter, sans-serif' } },
        PageHeroPreview({ bild: d.hero_bild, untertitel: d.hero_untertitel, label: 'Genuss & Gastronomie', titel: 'Kulinarik im Pitzlloch' }),
        h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', padding: '1.5rem', background: C.cream } },
          BildCard(d.philosophie_bild, 'Küche / Philosophie'),
          BildCard(d.wuensche_bild, 'Sonderwünsche / Torte')
        )
      );
    }
    CMS.registerPreviewTemplate('kulinarik', KulinarikPreview);

    /* ── RÄUMLICHKEITEN ─────────────────────────────────── */
    function RaeumePreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { fontFamily: 'Inter, sans-serif' } },
        PageHeroPreview({ bild: d.hero_bild, untertitel: d.hero_untertitel, label: 'Veranstaltungsstätte', titel: 'Räumlichkeiten' }),
        h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', padding: '1.5rem', background: C.cream } },
          BildCard(d.festsaal_bild, 'Festsaal'),
          BildCard(d.terrasse_bild, 'Terrasse & Garten')
        )
      );
    }
    CMS.registerPreviewTemplate('raeumlichkeiten', RaeumePreview);

    /* ── ÜBER UNS ───────────────────────────────────────── */
    function UeberUnsPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { fontFamily: 'Inter, sans-serif' } },
        PageHeroPreview({ bild: d.hero_bild, untertitel: '', label: 'Unsere Geschichte', titel: 'Über uns' }),
        h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', padding: '1.5rem', background: C.cream } },
          BildCard(d.geschichte_bild, 'Geschichte / Location'),
          BildCard(d.lage_bild, 'Lage / Panorama')
        )
      );
    }
    CMS.registerPreviewTemplate('ueberuns', UeberUnsPreview);

    /* ── GALERIE ────────────────────────────────────────── */
    function GaleriePreview({ entry }) {
      const d = getData(entry);
      const bilder = (d.bilder || []).filter(b => b.bild);
      return h('div', { style: { padding: '1.5rem', background: C.cream, fontFamily: 'Inter, sans-serif' } },
        h('h2', { style: { ...C.heading, fontSize: '1.6rem', marginBottom: '1rem' } }, `🖼️ Galerie – ${bilder.length} Bild${bilder.length !== 1 ? 'er' : ''}`),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '.75rem' } },
          ...bilder.map((b, i) =>
            h('div', { key: i, style: { borderRadius: '8px', overflow: 'hidden', position: 'relative' } },
              h('img', { src: b.bild, alt: b.alt, style: { width: '100%', height: '140px', objectFit: 'cover', display: 'block' } }),
              h('div', { style: { background: 'rgba(0,0,0,.55)', color: '#fff', fontSize: '.72rem', padding: '.3rem .5rem', position: 'absolute', bottom: 0, left: 0, right: 0 } }, b.kategorie)
            )
          )
        ),
        bilder.length === 0 && h('p', { style: { color: '#888', fontStyle: 'italic' } }, 'Noch keine Bilder hochgeladen.')
      );
    }
    CMS.registerPreviewTemplate('galerie', GaleriePreview);

    /* ── EINSTELLUNGEN ──────────────────────────────────── */
    function EinstellungenPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { padding: '2rem', fontFamily: 'Inter, sans-serif', background: C.cream, minHeight: '100vh' } },
        h('h2', { style: { ...C.heading, fontSize: '1.6rem', marginBottom: '1.25rem' } }, '⚙️ Kontaktdaten'),
        h('div', { style: { background: '#fff', borderRadius: '12px', padding: '1.5rem', display: 'grid', gap: '.7rem', maxWidth: '460px' } },
          row('📞', d.phone_display), row('✉️', d.email),
          row('📍', `${d.address1 || ''}, ${d.address2 || ''}`),
          h('hr', { style: { border: 'none', borderTop: '1px solid #eee' } }),
          row('🕐 Mo–Fr', d.hours_weekday), row('🕐 Sa', d.hours_saturday), row('🕐 So', d.hours_sunday),
          h('hr', { style: { border: 'none', borderTop: '1px solid #eee' } }),
          row('⭐ Bewertung', `${d.rating || ''} (${d.review_count || ''} Rez.)`),
          row('👥 Max. Gäste', d.max_guests),
        )
      );
      function row(lbl, val) {
        return h('div', { style: { display: 'flex', gap: '.75rem', fontSize: '.88rem' } },
          h('span', { style: { minWidth: '130px', color: '#888' } }, lbl),
          h('span', { style: { fontWeight: 500 } }, val || '–')
        );
      }
    }
    CMS.registerPreviewTemplate('einstellungen', EinstellungenPreview);

    /* ── BEWERTUNGEN ────────────────────────────────────── */
    function BewertungenPreview({ entry }) {
      const d = getData(entry);
      const reviews = d.reviews || [];
      return h('div', { style: { padding: '1.5rem', background: '#e8e4dc', fontFamily: 'Inter, sans-serif' } },
        h('h2', { style: { ...C.heading, fontSize: '1.6rem', textAlign: 'center', marginBottom: '1.5rem' } }, `⭐ ${reviews.length} Bewertung${reviews.length !== 1 ? 'en' : ''}`),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: '1rem' } },
          ...reviews.map((r, i) =>
            h('div', { key: i, style: { background: '#fff', padding: '1.25rem', borderRadius: '12px' } },
              h('div', { style: { color: C.gold, marginBottom: '.5rem' } }, '★'.repeat(Math.min(r.stars || 5, 5))),
              h('p', { style: { fontSize: '.87rem', fontStyle: 'italic', lineHeight: 1.7, marginBottom: '.75rem', color: '#444' } }, `„${r.text}"`),
              h('div', { style: { fontWeight: 600, fontSize: '.83rem' } }, r.author),
              h('div', { style: { fontSize: '.78rem', color: '#999' } }, r.date)
            )
          )
        )
      );
    }
    CMS.registerPreviewTemplate('bewertungen', BewertungenPreview);

    /* ── PREISE ─────────────────────────────────────────── */
    function PreisePreview({ entry }) {
      const d = getData(entry);
      const pakete = d.pakete || [];
      return h('div', { style: { padding: '1.5rem', background: '#e8e4dc', fontFamily: 'Inter, sans-serif' } },
        h('h2', { style: { ...C.heading, fontSize: '1.6rem', textAlign: 'center', marginBottom: '1.5rem' } }, '💰 Pakete'),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))', gap: '1.25rem' } },
          ...pakete.map((p, i) =>
            h('div', { key: i, style: { background: p.featured ? C.green : '#fff', color: p.featured ? C.cream : C.green, padding: '1.75rem', borderRadius: '14px', position: 'relative' } },
              p.badge && h('div', { style: { position: 'absolute', top: '-10px', left: '50%', transform: 'translateX(-50%)', background: C.gold, color: '#fff', fontSize: '.72rem', padding: '.25rem .8rem', borderRadius: '20px', whiteSpace: 'nowrap' } }, p.badge),
              h('div', { style: { fontSize: '1.8rem', marginBottom: '.3rem' } }, p.icon),
              h('div', { style: { fontFamily: '"Cormorant Garamond", serif', fontSize: '1.5rem' } }, p.name),
              h('div', { style: { fontSize: '.8rem', opacity: .6, margin: '.35rem 0 1rem' } }, p.price),
              h('ul', { style: { listStyle: 'none', padding: 0, margin: 0, fontSize: '.82rem' } },
                ...(p.features || []).map((f, j) =>
                  h('li', { key: j, style: { padding: '.3rem 0', borderBottom: `1px solid ${p.featured ? 'rgba(245,240,232,.12)' : '#f0ebe4'}`, display: 'flex', gap: '.4rem' } },
                    h('span', { style: { color: C.gold } }, '✓'), f
                  )
                )
              )
            )
          )
        )
      );
    }
    CMS.registerPreviewTemplate('preise', PreisePreview);

    /* ── FAQ ────────────────────────────────────────────── */
    function FaqPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { padding: '1.5rem', background: C.cream, fontFamily: 'Inter, sans-serif', maxWidth: '760px', margin: '0 auto' } },
        h('h2', { style: { ...C.heading, fontSize: '1.6rem', marginBottom: '1.5rem' } }, '❓ FAQ'),
        ...(d.kategorien || []).map((kat, ki) =>
          h('div', { key: ki, style: { marginBottom: '2rem' } },
            h('span', { style: C.label }, kat.label),
            h('h3', { style: { ...C.heading, fontSize: '1.3rem', marginBottom: '.75rem' } }, kat.heading),
            h('div', { style: { background: '#fff', borderRadius: '10px', overflow: 'hidden' } },
              ...(kat.fragen || []).map((f, fi) =>
                h('div', { key: fi, style: { padding: '.9rem 1.25rem', borderBottom: fi < kat.fragen.length - 1 ? '1px solid #f0ebe4' : 'none' } },
                  h('p', { style: { fontWeight: 600, fontSize: '.88rem', marginBottom: '.3rem', color: C.green } }, f.frage),
                  h('p', { style: { fontSize: '.82rem', color: '#666', lineHeight: 1.65, margin: 0 } }, f.antwort)
                )
              )
            )
          )
        )
      );
    }
    CMS.registerPreviewTemplate('faq', FaqPreview);

    /* ── TEAM ───────────────────────────────────────────── */
    function TeamPreview({ entry }) {
      const d = getData(entry);
      return h('div', { style: { padding: '1.5rem', background: '#e8e4dc', fontFamily: 'Inter, sans-serif' } },
        h('h2', { style: { ...C.heading, fontSize: '1.6rem', textAlign: 'center', marginBottom: '1.5rem' } }, '👥 Team'),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: '1.25rem' } },
          ...(d.mitglieder || []).map((m, i) =>
            h('div', { key: i, style: { background: '#fff', borderRadius: '12px', overflow: 'hidden', textAlign: 'center' } },
              m.bild
                ? h('img', { src: m.bild, alt: m.name, style: { width: '100%', height: '200px', objectFit: 'cover' } })
                : h('div', { style: { width: '100%', height: '200px', background: C.cream, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.5rem', color: '#ccc' } }, '👤'),
              h('div', { style: { padding: '1rem' } },
                h('h4', { style: { margin: '0 0 .2rem', color: C.green } }, m.name),
                h('span', { style: C.label }, m.rolle),
                h('p', { style: { fontSize: '.83rem', fontStyle: 'italic', fontFamily: '"Cormorant Garamond", serif', color: '#666', marginTop: '.4rem' } }, `„${m.zitat}"`)
              )
            )
          )
        )
      );
    }
    CMS.registerPreviewTemplate('team', TeamPreview);

    /* Hilfsfunktion: Bildkarte */
    /* ── INFO-BANNER VORSCHAU ───────────────────────────────── */
    function BannerPreview({ entry }) {
      const d = getData(entry);
      if (!d.aktiv) return h('div', { style: { padding: '1.5rem', background: '#f5f0e8', fontFamily: 'Inter, sans-serif', borderRadius: '8px', color: '#888', textAlign: 'center' } },
        h('p', {}, '🔕 Banner ist deaktiviert – aktiviere ihn oben um ihn zu sehen.')
      );
      const bgs = { info: C.gold, urlaub: '#7A5220', event: C.green, warnung: '#8B3A2A' };
      const icons = { info: 'ℹ️', urlaub: '🏖️', event: '🎉', warnung: '⚠️' };
      const bg = bgs[d.typ] || C.gold;
      const fgColor = d.typ === 'event' ? '#D4B870' : '#fff';
      return h('div', {},
        h('div', { style: { background: bg, color: fgColor, padding: '.65rem 3rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '.65rem', fontFamily: 'Inter, sans-serif', fontSize: '.88rem', position: 'relative' } },
          h('span', {}, icons[d.typ] || 'ℹ️'),
          h('span', { style: { fontWeight: 500 } }, d.text || '(Kein Text eingegeben)'),
          d.link_text && h('span', { style: { textDecoration: 'underline', opacity: .85 } }, d.link_text + ' →'),
          h('span', { style: { position: 'absolute', right: '.9rem', opacity: .65, fontSize: '.9rem' } }, '✕')
        ),
        h('div', { style: { padding: '1rem', background: '#f5f0e8', fontFamily: 'Inter, sans-serif', fontSize: '.78rem', color: '#888', textAlign: 'center' } },
          '↑ So sieht der Banner oben auf der Seite aus'
        )
      );
    }
    CMS.registerPreviewTemplate('banner', BannerPreview);

    /* ── KALENDER VORSCHAU ──────────────────────────────────── */
    function KalenderPreview({ entry }) {
      const d = getData(entry);
      if (!d.aktiv) return h('div', { style: { padding: '1.5rem', background: '#f5f0e8', fontFamily: 'Inter, sans-serif', borderRadius: '8px', color: '#888', textAlign: 'center' } },
        h('p', {}, '📅 Kalender ist deaktiviert.')
      );
      const buchungen = d.buchungen || [];
      const mNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
      const dL = ['Mo','Di','Mi','Do','Fr','Sa','So'];
      const booked = {};
      buchungen.forEach(b => {
        if (!b.von || !b.bis) return;
        let cur = new Date(b.von + 'T00:00:00');
        const end = new Date(b.bis + 'T00:00:00');
        while (cur <= end) { booked[cur.toISOString().split('T')[0]] = b.typ || 'belegt'; cur.setDate(cur.getDate() + 1); }
      });
      const today = new Date(); today.setHours(0,0,0,0);
      const months = [];
      for (let i = 0; i < 3; i++) months.push(new Date(today.getFullYear(), today.getMonth() + i, 1));
      const typColors = { belegt: 'rgba(160,50,50,.2)', event: 'rgba(196,163,90,.35)', option: 'rgba(196,163,90,.1)', frei: 'rgba(45,74,62,.08)', past: '#f0ece6' };
      const typTextColors = { belegt: '#923030', event: '#7A5E20', option: C.gold, frei: C.green, past: '#ccc' };
      return h('div', { style: { padding: '1.5rem', background: '#e8e4dc', fontFamily: 'Inter, sans-serif' } },
        h('h2', { style: { ...C.heading, fontSize: '1.5rem', textAlign: 'center', marginBottom: '1rem' } }, d.titel || 'Verfügbarkeit'),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem' } },
          ...months.map((m, mi) => {
            const year = m.getFullYear(); const month = m.getMonth();
            const last = new Date(year, month + 1, 0).getDate();
            let dow = m.getDay() - 1; if (dow < 0) dow = 6;
            const cells = [];
            dL.forEach(l => cells.push(h('div', { key:'d'+l, style: { textAlign:'center', fontSize:'.58rem', fontWeight:600, color:'#888', padding:'.2rem 0' } }, l)));
            for (let i = 0; i < dow; i++) cells.push(h('div', { key:'e'+i }));
            for (let day = 1; day <= last; day++) {
              const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const typ = booked[ds]; const isPast = new Date(year, month, day) < today;
              const k = isPast ? 'past' : (typ || 'frei');
              cells.push(h('div', { key: ds, style: { aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'.62rem', borderRadius:'3px', background: typColors[k], color: typTextColors[k], fontWeight: (typ && !isPast) ? 600 : 400 } }, String(day)));
            }
            return h('div', { key: mi, style: { background: '#fff', borderRadius: '10px', overflow: 'hidden' } },
              h('div', { style: { background: C.green, color: C.cream, textAlign:'center', padding:'.5rem', fontSize:'.85rem', letterSpacing:'.05em', fontFamily:'"Cormorant Garamond",serif' } }, mNames[month] + ' ' + year),
              h('div', { style: { display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'1px', padding:'.4rem', background: '#e8e4dc' } }, ...cells)
            );
          })
        ),
        h('p', { style: { textAlign:'center', fontSize:'.75rem', color:'#999', marginTop:'.75rem', fontStyle:'italic' } }, d.hinweis || ''),
        h('div', { style: { textAlign:'center', marginTop:'.75rem', fontSize:'.78rem', color:'#888' } }, `📋 ${buchungen.length} Buchung${buchungen.length !== 1 ? 'en' : ''} eingetragen`)
      );
    }
    CMS.registerPreviewTemplate('kalender', KalenderPreview);

    function BildCard(src, label) {
      return h('div', { style: { borderRadius: '10px', overflow: 'hidden', background: '#fff' } },
        src
          ? h('img', { src, alt: label, style: { width: '100%', height: '200px', objectFit: 'cover', display: 'block' } })
          : h('div', { style: { width: '100%', height: '200px', background: '#e8e4dc', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#aaa', fontSize: '.85rem', flexDirection: 'column', gap: '.5rem' } },
              h('span', { style: { fontSize: '2rem' } }, '🖼️'),
              h('span', {}, label + ' – noch kein Bild')
            )
      );
    }

  })();
  </script>
</body>
</html>
